<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ikkis Coffee Roasters — Order Entry</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:    #F0EBE1;
  --dark:  #1E1208;
  --brown: #5C3317;
  --rust:  #C05A20;
  --line:  #C8BEA8;
  --muted: #8A7B6A;
  --mono:  'IBM Plex Mono', monospace;
  --sans:  'IBM Plex Sans', sans-serif;
  --serif: 'Playfair Display', serif;
}
body { background: var(--bg); font-family: var(--sans); color: var(--dark); min-height: 100vh; padding-bottom: 80px; }

.page { max-width: 680px; margin: 0 auto; padding: 48px 32px; }

/* Header */
.header { padding-bottom: 20px; border-bottom: 2px solid var(--dark); margin-bottom: 40px; }
.header h1 { font-family: var(--serif); font-size: 42px; color: var(--dark); line-height: 1; margin-bottom: 6px; }
.header-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

/* Script URL */
.script-url-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border: 1px solid var(--line); background: rgba(255,255,255,0.3); margin-bottom: 40px; }
.script-url-row label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }
.script-url-row input { flex: 1; border: none; background: none; font-family: var(--mono); font-size: 12px; color: var(--dark); outline: none; }
.script-url-row input::placeholder { color: var(--line); }

/* Section label */
.sec-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }

/* Field */
.field { margin-bottom: 28px; }
.field-label { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--brown); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
.field-label span { color: var(--rust); }
.field input, .field select, .field textarea {
  width: 100%; background: none; border: none; border-bottom: 1.5px solid var(--brown);
  font-family: var(--mono); font-size: 18px; color: var(--dark);
  padding: 6px 0 10px; outline: none; appearance: none; border-radius: 0; transition: border-color 0.2s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-bottom-color: var(--rust); }
.field textarea { resize: none; min-height: 52px; line-height: 1.5; }
.field select { cursor: pointer; }
.field input::placeholder { color: var(--line); }

/* Source selector */
.source-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.source-btn {
  border: 1.5px solid var(--line); background: none; padding: 14px 10px;
  cursor: pointer; text-align: center; transition: all 0.15s; font-family: var(--mono);
}
.source-btn:hover { border-color: var(--brown); }
.source-btn.selected { border-color: var(--rust); background: rgba(192,90,32,0.07); }
.source-code { font-size: 20px; font-weight: 500; color: var(--dark); display: block; margin-bottom: 4px; }
.source-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; display: block; line-height: 1.4; }
.source-btn.selected .source-code { color: var(--rust); }
.source-btn.selected .source-label { color: var(--rust); }

/* City autocomplete */
.city-wrap { position: relative; }
.city-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #FAF7F0; border: 1px solid var(--line); z-index: 50; display: none; max-height: 200px; overflow-y: auto; }
.city-suggestions.open { display: block; }
.city-sug-item { padding: 10px 14px; font-family: var(--mono); font-size: 14px; cursor: pointer; border-bottom: 1px solid #EEE8DC; transition: background 0.1s; }
.city-sug-item:hover, .city-sug-item.active { background: var(--line); }
.city-sug-item:last-child { border-bottom: none; }

/* Order ID box */
.order-id-box { background: var(--dark); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 36px; }
.oid-left { display: flex; flex-direction: column; gap: 6px; }
.oid-label { font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; }
.oid-value { font-family: var(--mono); font-size: 20px; font-weight: 500; color: white; letter-spacing: 1px; }
.oid-right { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.35); text-align: right; line-height: 1.6; }

hr { border: none; border-top: 1px solid var(--line); margin: 36px 0; }

/* Urgent */
.urgent-row { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; padding: 8px 0; margin-bottom: 36px; border: none; background: none; width: 100%; text-align: left; }
.urg-box { width: 18px; height: 18px; border: 1.5px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; transition: all 0.15s; }
.urgent-row.on .urg-box { background: var(--rust); border-color: var(--rust); color: white; }
.urgent-row.on { color: var(--rust); }

/* Item card */
.item-card { background: rgba(255,255,255,0.35); border: 1px solid var(--line); padding: 18px 20px; margin-bottom: 10px; }
.item-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.item-num { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
.item-remove { border: none; background: none; font-family: var(--mono); font-size: 11px; color: var(--muted); cursor: pointer; letter-spacing: 1px; text-transform: uppercase; padding: 0; transition: color 0.15s; }
.item-remove:hover { color: var(--rust); }
.item-grid { display: grid; grid-template-columns: 1fr 1fr 100px; gap: 16px; margin-bottom: 14px; }
.item-grid-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.item-field label { display: block; font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.item-field label span { color: var(--rust); }
.item-field select, .item-field input {
  width: 100%; background: none; border: none; border-bottom: 1px solid var(--line);
  font-family: var(--mono); font-size: 14px; color: var(--dark);
  padding: 5px 0 7px; outline: none; appearance: none; border-radius: 0; transition: border-color 0.15s;
}
.item-field select:focus, .item-field input:focus { border-bottom-color: var(--rust); }
.item-field input::placeholder { color: var(--line); }

/* Add item */
.add-item-btn { width: 100%; border: 1.5px dashed var(--line); background: none; padding: 16px; font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; margin-bottom: 24px; }
.add-item-btn:hover { border-color: var(--brown); color: var(--brown); }

/* Summary */
.summary { display: none; border-top: 1px solid var(--line); padding-top: 14px; margin-bottom: 36px; gap: 28px; }
.summary.visible { display: flex; }
.sum-stat { display: flex; flex-direction: column; gap: 2px; }
.sum-val { font-family: var(--mono); font-size: 22px; font-weight: 500; }
.sum-lbl { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }

/* Submit */
.submit-btn { width: 100%; background: var(--rust); border: none; padding: 20px; font-family: var(--mono); font-size: 13px; font-weight: 500; color: white; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 10px; }
.submit-btn:hover { background: #A04818; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--dark); color: white; font-family: var(--mono); font-size: 11px; letter-spacing: 0.5px; padding: 14px 20px; opacity: 0; transform: translateY(10px); transition: all 0.25s; pointer-events: none; z-index: 999; max-width: 320px; line-height: 1.5; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok  { background: #2A5C1A; }
.toast.err { background: #8B0000; }
.spin { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: sp 0.7s linear infinite; flex-shrink: 0; }
@keyframes sp { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .page { padding: 32px 20px; }
  .header h1 { font-size: 30px; }
  .source-grid { grid-template-columns: repeat(3,1fr); }
  .item-grid { grid-template-columns: 1fr 1fr; }
  .item-grid > *:nth-child(3) { grid-column: 1 / -1; }
}
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <h1>Ikkis Coffee Roasters</h1>
    <div class="header-sub">Order Entry System</div>
  </div>

  <!-- Script URL -->
  <div class="script-url-row">
    <label>Script URL</label>
    <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/…/exec" />
  </div>

  <!-- Customer Details -->
  <div class="sec-label">Customer Details</div>

  <!-- Source -->
  <div class="field">
    <div class="field-label">Source <span>*</span></div>
    <div class="source-grid">
      <button class="source-btn" onclick="selectSource('S')" id="src-S">
        <span class="source-code">S</span>
        <span class="source-label">Shopify<br>B2C</span>
      </button>
      <button class="source-btn" onclick="selectSource('W')" id="src-W">
        <span class="source-code">W</span>
        <span class="source-label">WhatsApp / Phone<br>B2C</span>
      </button>
      <button class="source-btn" onclick="selectSource('B')" id="src-B">
        <span class="source-code">B</span>
        <span class="source-label">B2B<br>Wholesale</span>
      </button>
    </div>
  </div>

  <div class="field">
    <div class="field-label">Customer Name <span>*</span></div>
    <input type="text" id="customerName" autocomplete="off" />
  </div>

  <div class="field">
    <div class="field-label">City</div>
    <div class="city-wrap">
      <input type="text" id="cityInput" autocomplete="off" oninput="onCityInput()" onblur="hideSuggestions()" onkeydown="cityKeydown(event)" />
      <div class="city-suggestions" id="citySugg"></div>
    </div>
  </div>

  <div class="field">
    <div class="field-label">Phone / Notes</div>
    <input type="text" id="phone" />
  </div>

  <!-- Order ID box -->
  <div class="order-id-box">
    <div class="oid-left">
      <div class="oid-label">Order ID</div>
      <div class="oid-value" id="orderId">—</div>
    </div>
    <div class="oid-right">Auto-generated<br>on name entry</div>
  </div>

  <div class="field">
    <div class="field-label">Dispatch Date <span>*</span></div>
    <input type="date" id="dispatchDate" />
  </div>

  <button class="urgent-row" id="urgentRow" onclick="toggleUrgent()">
    <div class="urg-box" id="urgBox"></div>
    <span id="urgLabel">Mark as Urgent</span>
  </button>

  <hr style="margin-top:0;">

  <!-- Items -->
  <div class="sec-label">Items</div>
  <div id="itemsArea"></div>
  <button class="add-item-btn" onclick="addItem()">+ Add Coffee Item</button>

  <div class="summary" id="summary">
    <div class="sum-stat"><div class="sum-val" id="sumLines">0</div><div class="sum-lbl">Lines</div></div>
    <div class="sum-stat"><div class="sum-val" id="sumBags">0</div><div class="sum-lbl">Total Bags</div></div>
    <div class="sum-stat"><div class="sum-val" id="sumKg">0.0</div><div class="sum-lbl">Est. KG</div></div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitOrder()">
    <span id="submitLabel">Generate Order Slip</span>
  </button>

</div>
<div class="toast" id="toast"></div>

<script>
// ── Script URL ──
const scriptUrlEl = document.getElementById('scriptUrl');

// Both script URLs — order sent to ALL simultaneously
// SCRIPT_URLS[0] is also used for doGet (order counter) — keep new script first
const SCRIPT_URLS = [
  'https://script.google.com/macros/s/AKfycbzrbZi2E6eXEZXLspm94RxwHR1p2JW6iR3VyQw1vQ0j7-irEP9PMbeXkMafBKbcu-05/exec',
  ];
scriptUrlEl.value = '2 scripts connected';
scriptUrlEl.readOnly = true;
scriptUrlEl.style.opacity = '0.6';

// ── Products (full list from image) ──
const PRODUCTS = [
  'Cafe Arabica',
  'Cafe Blend',
  'Mulberry Melt',
  'Berry Bliss',
  'Golden Glow',
  'Flavor Flight',
  'Morning Mist',
  'Citrus Cloak',
  'Deep Desire',
  'Orange Octave',
  'House Espresso Blend',
  'House Espresso Arabica',
  'Cold Brew Roast',
  'Cold Brew Liquid',
  'Filter Blend',
  'Custom'
];

const BAGS   = ['250g','500g','1kg'];
const GRINDS = ['Whole Bean','Espresso Home (4.5)','Espresso Pro (3.5)','Pour Over (12)','French Press (15)','Moka Pot (5)','Aeropress (6)','Cold Brew (16)','Custom'];

// ── Indian cities ──
const CITIES = [
  'Ahmedabad','Agra','Ajmer','Aligarh','Amritsar','Aurangabad',
  'Bengaluru','Bhopal','Bhubaneswar','Chandigarh','Chennai','Coimbatore',
  'Dehradun','Delhi','Dhanbad','Faridabad','Ghaziabad','Gurgaon',
  'Guwahati','Gwalior','Howrah','Hyderabad','Indore','Jabalpur',
  'Jaipur','Jalandhar','Jammu','Jodhpur','Kanpur','Kochi','Kolkata',
  'Kota','Kozhikode','Ludhiana','Lucknow','Madurai','Mangaluru',
  'Meerut','Mumbai','Mysuru','Nagpur','Nashik','Navi Mumbai',
  'Noida','Patna','Pune','Raipur','Rajkot','Ranchi','Surat',
  'Thane','Thiruvananthapuram','Tiruchirappalli','Udaipur','Vadodara',
  'Varanasi','Vijayawada','Visakhapatnam','Warangal'
];

// ── Source ──
let selectedSource = '';
function selectSource(code) {
  selectedSource = code;
  ['S','W','B'].forEach(c => document.getElementById('src-'+c).classList.toggle('selected', c===code));
  if (currentOrderNum) { const d = new Date(), p = n => String(n).padStart(2,'0'); const date = `${d.getFullYear().toString().slice(2)}${p(d.getMonth()+1)}${p(d.getDate())}`; document.getElementById('orderId').textContent = `${code}-${date}-${currentOrderNum}`; }
}

// ── City autocomplete ──
let cityHighlight = -1;
function onCityInput() {
  const val = document.getElementById('cityInput').value.trim().toLowerCase();
  const box = document.getElementById('citySugg');
  if (!val) { box.classList.remove('open'); return; }
  const matches = CITIES.filter(c => c.toLowerCase().startsWith(val)).slice(0,6);
  if (!matches.length) { box.classList.remove('open'); return; }
  cityHighlight = -1;
  box.innerHTML = matches.map(c => `<div class="city-sug-item" data-val="${c}" onmousedown="selectCity('${c}')">${c}</div>`).join('');
  box.classList.add('open');
}
function selectCity(name) {
  document.getElementById('cityInput').value = name;
  document.getElementById('citySugg').classList.remove('open');
}
function hideSuggestions() {
  setTimeout(() => document.getElementById('citySugg').classList.remove('open'), 150);
}
function cityKeydown(e) {
  const box = document.getElementById('citySugg');
  const its = box.querySelectorAll('.city-sug-item');
  if (!its.length) return;
  if (e.key==='ArrowDown')  { e.preventDefault(); cityHighlight=Math.min(cityHighlight+1,its.length-1); }
  else if (e.key==='ArrowUp') { e.preventDefault(); cityHighlight=Math.max(cityHighlight-1,0); }
  else if (e.key==='Enter'&&cityHighlight>=0) { e.preventDefault(); selectCity(its[cityHighlight].dataset.val); return; }
  else if (e.key==='Escape') { box.classList.remove('open'); return; }
  its.forEach((el,i) => el.classList.toggle('active', i===cityHighlight));
}

// ── Order ID — fetched from Sheet via doGet ──
let currentOrderNum = null;
let fetchingOrderNum = false;

async function fetchNextOrderNum() {
  const url = SCRIPT_URLS[0];
  try {
    const res  = await fetch(url + '?action=nextOrderNum');
    const data = await res.json();
    return data.next || null;
  } catch(e) {
    // fallback: timestamp-based unique number
    const now = new Date();
    return String(now.getHours()).padStart(2,'0') +
           String(now.getMinutes()).padStart(2,'0') +
           String(now.getSeconds()).padStart(2,'0');
  }
}

async function updateOrderId() {
  const name = document.getElementById('customerName').value.trim();
  if (!name) { document.getElementById('orderId').textContent = '—'; return; }

  // Only fetch once per order session
  if (!currentOrderNum && !fetchingOrderNum) {
    fetchingOrderNum = true;
    document.getElementById('orderId').textContent = '…';
    currentOrderNum = await fetchNextOrderNum();
    fetchingOrderNum = false;
  }

  if (!currentOrderNum) return;
  const src = selectedSource || 'X';
  const d = new Date(), p = n => String(n).padStart(2,'0');
  const date = `${d.getFullYear().toString().slice(2)}${p(d.getMonth()+1)}${p(d.getDate())}`;
  document.getElementById('orderId').textContent = `${src}-${date}-${currentOrderNum}`;
}

document.getElementById('customerName').addEventListener('input', updateOrderId);

// ── Urgent ──
let isUrgent = false;
function toggleUrgent() {
  isUrgent = !isUrgent;
  document.getElementById('urgentRow').classList.toggle('on', isUrgent);
  document.getElementById('urgBox').textContent   = isUrgent ? '✓' : '';
  document.getElementById('urgLabel').textContent = isUrgent ? 'Urgent Order' : 'Mark as Urgent';
}

// ── Items ──
let items = [];
function addItem() {
  items.push({ id: Date.now(), product:'', bagSize:'', qty:'', grind:'', notes:'' });
  render();
}
function removeItem(id) {
  items = items.filter(i => i.id !== id);
  render();
}
function setField(id, field, val) {
  const it = items.find(i => i.id === id);
  if (it) { it[field] = val; calcSummary(); }
}

function render() {
  const area = document.getElementById('itemsArea');
  area.innerHTML = items.map((it, idx) => `
    <div class="item-card">
      <div class="item-card-header">
        <div class="item-num">Item ${idx+1}</div>
        <button class="item-remove" onclick="removeItem(${it.id})">Remove</button>
      </div>
      <div class="item-grid">
        <div class="item-field" style="grid-column:1/3">
          <label>Product <span>*</span></label>
          <select onchange="setField(${it.id},'product',this.value)">
            <option value="">Select product…</option>
            ${PRODUCTS.map(p=>`<option ${it.product===p?'selected':''} value="${p}">${p}</option>`).join('')}
          </select>
        </div>
        <div class="item-field">
          <label>Qty <span>*</span></label>
          <select onchange="setField(${it.id},'qty',this.value)">
            <option value="">—</option>
            ${Array.from({length:60},(_,i)=>`<option value="${i+1}" ${it.qty==i+1?'selected':''}>${i+1}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="item-grid-bottom">
        <div class="item-field">
          <label>Bag Size <span>*</span></label>
          <select onchange="setField(${it.id},'bagSize',this.value)">
            <option value="">Select…</option>
            ${BAGS.map(b=>`<option ${it.bagSize===b?'selected':''} value="${b}">${b}</option>`).join('')}
          </select>
        </div>
        <div class="item-field">
          <label>Grind</label>
          <select onchange="setField(${it.id},'grind',this.value)">
            <option value="">Select…</option>
            ${GRINDS.map(g=>`<option ${it.grind===g?'selected':''} value="${g}">${g}</option>`).join('')}
          </select>
        </div>
        <div class="item-field" style="grid-column:1/-1">
          <label>Item Notes</label>
          <input type="text" value="${it.notes}" onchange="setField(${it.id},'notes',this.value)" />
        </div>
      </div>
    </div>
  `).join('');
  document.getElementById('summary').classList.toggle('visible', items.length > 0);
  calcSummary();
}

function calcSummary() {
  let bags = 0, grams = 0;
  items.forEach(it => {
    const q = parseInt(it.qty)||0;
    bags  += q;
    grams += q*(it.bagSize==='250g'?250:it.bagSize==='500g'?500:it.bagSize==='1kg'?1000:0);
  });
  document.getElementById('sumLines').textContent = items.length;
  document.getElementById('sumBags').textContent  = bags;
  document.getElementById('sumKg').textContent    = (grams/1000).toFixed(1);
}

// ── Toast ──
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'), 4000);
}

// ── Validate ──
function validate() {
  if (!selectedSource)                                      { toast('Select an order source (S / W / B)','err'); return false; }
  if (!document.getElementById('customerName').value.trim()){ toast('Customer name required','err'); return false; }
  if (!document.getElementById('dispatchDate').value)       { toast('Dispatch date required','err'); return false; }
  if (!items.length)                                        { toast('Add at least one item','err'); return false; }
  for (let i=0;i<items.length;i++) {
    const it=items[i];
    if (!it.product)              { toast(`Item ${i+1}: select a product`,'err'); return false; }
    if (!it.bagSize)              { toast(`Item ${i+1}: select bag size`,'err'); return false; }
    if (!it.qty||parseInt(it.qty)<1) { toast(`Item ${i+1}: select quantity`,'err'); return false; }
  }
  return true;
}

// ── Submit ──
async function submitOrder() {
  if (!validate()) return;
  // Send to all connected scripts in parallel
  const urls = SCRIPT_URLS;

  const btn = document.getElementById('submitBtn');
  const lbl = document.getElementById('submitLabel');
  btn.disabled = true;
  lbl.innerHTML = '<div class="spin"></div> Submitting…';

  const orderId = document.getElementById('orderId').textContent;
  const payload = {
    orderId:      orderId==='—' ? `X-000-000` : orderId,
    source:       selectedSource,
    sourceFull:   selectedSource === 'S' ? 'S — Shopify B2C' :
                  selectedSource === 'W' ? 'W — WhatsApp / Phone B2C' :
                  selectedSource === 'B' ? 'B — B2B Wholesale' : '—',
    customerName: document.getElementById('customerName').value.trim(),
    city:         document.getElementById('cityInput').value.trim(),
    phone:        document.getElementById('phone').value.trim(),
    dispatchDate: document.getElementById('dispatchDate').value,
    urgent:       isUrgent,
    submittedAt:  new Date().toISOString(),
    items: items.map(it=>({
      product: it.product,
      bagSize: it.bagSize,
      qty:     parseInt(it.qty),
      grind:   it.grind || 'Whole Bean',
      notes:   it.notes
    }))
  };

  try {
    await Promise.all(urls.map(u => fetch(u, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })));
    toast(`Order ${payload.orderId} submitted`, 'ok');
    setTimeout(resetForm, 1500);
  } catch(err) {
    toast('Submission failed','err');
  } finally {
    btn.disabled = false;
    lbl.textContent = 'Generate Order Slip';
  }
}

function resetForm() {
  ['customerName','cityInput','phone','dispatchDate'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('orderId').textContent = '—';
  selectedSource = '';
  ['S','W','B'].forEach(c=>document.getElementById('src-'+c).classList.remove('selected'));
  isUrgent = false;
  document.getElementById('urgentRow').classList.remove('on');
  document.getElementById('urgBox').textContent = '';
  document.getElementById('urgLabel').textContent = 'Mark as Urgent';
  currentOrderNum = null;
  items = []; render();
}

// ── Init ──
document.getElementById('dispatchDate').min = new Date().toISOString().split('T')[0];
render();
</script>
</body>
</html>
